<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>JGA Zahlenschloss</title>
  <style>
    :root {
      --bg1: #fff7fb;
      --bg2: #ffe8f3;
      --card: rgba(255,255,255,0.82);
      --text: #2c1b24;
      --muted: #7b6170;
      --accent: #ff4f9a;
      --accent-2: #ff88ba;
      --danger: #ff4d4d;
      --success: #2aa876;
      --shadow: 0 20px 50px rgba(0,0,0,0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #fff 0%, transparent 30%),
        radial-gradient(circle at bottom right, #ffd1e4 0%, transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .wrap {
      width: min(100%, 440px);
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px 22px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      line-height: 1.1;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .lock {
      width: 108px;
      height: 108px;
      margin: 0 auto 20px;
      position: relative;
      animation: floaty 3s ease-in-out infinite;
    }

    .lock::after {
      content: "🔒";
      position: absolute;
      inset: 28px 0 0 0;
      display: grid;
      place-items: center;
      font-size: 4rem;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.08));
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px 0 16px;
    }

    .digit {
      width: 100%;
      aspect-ratio: 1 / 1.08;
      border: 2px solid #ffd0e3;
      border-radius: 18px;
      text-align: center;
      font-size: clamp(1.6rem, 7vw, 2rem);
      font-weight: 700;
      color: var(--text);
      background: rgba(255,255,255,0.96);
      outline: none;
      transition: 0.18s ease;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .digit::-webkit-outer-spin-button,
    .digit::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .digit:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,79,154,0.16);
      transform: translateY(-1px);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      box-shadow: 0 12px 24px rgba(255,79,154,0.28);
    }

    .secondary {
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border: 1px solid #ffd0e3;
    }

    button:active {
      transform: scale(0.985);
    }

    .message {
      min-height: 24px;
      margin-top: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .message.error {
      color: var(--danger);
      animation: shake 0.35s ease;
    }

    .message.success {
      color: var(--success);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    .success-box {
      display: none;
      margin-top: 0;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.95);
      border: 1px solid #ffd0e3;
      text-align: center;
    }

    .success-box.show {
      display: block;
      animation: pop 0.32s ease;
    }

    @keyframes pop {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .gif {
      width: min(100%, 260px);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
      display: block;
      margin: 0 auto 14px;
      background: #fff;
    }

    .hint-title {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .hint-text {
      margin: 0;
      line-height: 1.45;
      font-size: 1rem;
    }

    .mini {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div id="lockSection">
        <div class="lock" aria-hidden="true"></div>
        <h1>Knack den Code 💃</h1>
        <p class="sub">Gib den vierstelligen Code ein, um den nächsten Hinweis freizuschalten.</p>

        <div class="inputs" aria-label="Vierstelliger Code">
          <input class="digit" inputmode="numeric" maxlength="1" aria-label="Erste Zahl" />
          <input class="digit" inputmode="numeric" maxlength="1" aria-label="Zweite Zahl" />
          <input class="digit" inputmode="numeric" maxlength="1" aria-label="Dritte Zahl" />
          <input class="digit" inputmode="numeric" maxlength="1" aria-label="Vierte Zahl" />
        </div>

        <div class="actions">
          <button class="primary" id="checkBtn">Code prüfen</button>
          <button class="secondary" id="resetBtn" type="button">Zurücksetzen</button>
        </div>

        <div id="message" class="message" aria-live="polite"></div>

        <p class="mini">Tipp: Die Eingabe springt automatisch weiter.</p>
      </div>

      <div id="successBox" class="success-box" aria-live="polite">
        <img id="successGif" class="gif" alt="Erfolgs-GIF" />
        <h2 class="hint-title">Geschafft 🎉</h2>
        <p id="hintText" class="hint-text"></p>
      </div>
    </section>
  </main>

  <script>
    /*
      ===============================
      KONFIGURATION – HIER ANPASSEN
      ===============================
    */
    const CORRECT_CODE = "1895";

    const NEXT_HINT = "Super! Platzhalter: Euer nächster Hinweis wartet dort, wo es in Esslingen flüssig, kühl und vielleicht ein bisschen prickelnd wird. 🍾";

    const SUCCESS_GIF = "success.gif";

    const ERROR_TEXT = "Leider falsch! 😈";

    /*
      ===============================
      LOGIK
      ===============================
    */
    const inputs = [...document.querySelectorAll('.digit')];
    const message = document.getElementById('message');
    const successBox = document.getElementById('successBox');
    const successGif = document.getElementById('successGif');
    const hintText = document.getElementById('hintText');
    const checkBtn = document.getElementById('checkBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lockSection = document.getElementById('lockSection');

    successGif.src = SUCCESS_GIF;
    hintText.textContent = NEXT_HINT;

    inputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        input.value = (input.value || '').replace(/\D/g, '').slice(0, 1);
        if (input.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }

        if (event.key === 'Enter') {
          checkCode();
        }
      });
    });

    checkBtn.addEventListener('click', checkCode);
    resetBtn.addEventListener('click', resetAll);

    function getCode() {
      return inputs.map(input => input.value).join('');
    }

    function showMessage(text, type = '') {
      message.textContent = text;
      message.className = `message ${type}`.trim();
    }

    function playErrorSound() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const ctx = new AudioContextClass();
      const now = ctx.currentTime;

      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();

      osc1.type = 'sawtooth';
      osc2.type = 'square';
      osc1.frequency.setValueAtTime(220, now);
      osc2.frequency.setValueAtTime(180, now);
      osc1.frequency.exponentialRampToValueAtTime(90, now + 0.28);
      osc2.frequency.exponentialRampToValueAtTime(70, now + 0.28);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);

      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(ctx.destination);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.32);
      osc2.stop(now + 0.32);

      setTimeout(() => ctx.close(), 450);
    }

    function checkCode() {
      const code = getCode();

      if (code.length < 4) {
        showMessage('Bitte vier Zahlen eingeben.', 'error');
        return;
      }

      if (code === CORRECT_CODE) {
        lockSection.style.display = 'none';
        successBox.classList.add('show');
      } else {
        showMessage(ERROR_TEXT, 'error');
        playErrorSound();
      }
    }

    function resetAll() {
      inputs.forEach(input => {
        input.value = '';
        input.disabled = false;
      });
      successBox.classList.remove('show');
      lockSection.style.display = 'block';
      showMessage('');
      inputs[0].focus();
    }

    window.addEventListener('load', () => {
      inputs[0].focus();
    });
  </script>
</body>
</html>
